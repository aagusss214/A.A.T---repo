<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario</title>
</head>

<body>
    <form action="" method="post">
        <fieldset>
            <legend>Usuario</legend>
            <label for="">Clave: </label>
            <input type="password" name="password">
            <br><br>
            <label for="">Numero De Usuario: </label>
            <input type="number" name="num-user">
            <br><br>
            <label for="">Mail: </label>
            <input type="email" name="email">
            <br><br>
        </fieldset>
        <fieldset>
            <legend>Datos de usuario</legend>
            <label for="">Nombre de usuario: </label>
            <input type="text" name="username">
            <br><br>
            <label for="">Turno: </label>
            <br><br>
            <input type="radio" name="turno" value="Mañana">
            <label for="">Mañana</label>
            <input type="radio" name="turno" value="Tarde">
            <label for="">Tarde</label>
            <input type="radio" name="turno" value="Noche">
            <label for="">Noche</label>
        </fieldset>
        <br>
        <br>
        <input type="submit" value="Enviar">
    </form>
</body>

</html>
